name: DronePi CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ── Job 1: Python linting ────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        # E/W = pycodestyle, F = pyflakes, I = isort
        # Ignore E501 (line too long) and E402 (module level import not at top)
        # since ROS sys.path manipulation requires late imports.
        run: |
          ruff check \
            --select E,W,F,I \
            --ignore E501,E402 \
            unitree_drone_mapper/ rpi_server/

  # ── Job 2: Unit tests (no ROS, no hardware) ──────────────────────────────────
  pytest:
    name: Unit tests (mesh_tools)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run mesh_tools unit tests
        run: |
          pytest unitree_drone_mapper/tests/ground_class_test.py \
                 unitree_drone_mapper/tests/conftest.py \
                 unitree_drone_mapper/tests/test_dtm_builder.py \
                 unitree_drone_mapper/tests/mesh_merger_test.py \
                 -v --tb=short

  # ── Job 3: ROS 2 Jazzy workspace build ──────────────────────────────────────
  ros-build:
    name: ROS 2 Jazzy build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup ROS 2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install colcon + rosdep
        run: |
          sudo apt-get install -y \
            python3-colcon-common-extensions \
            python3-rosdep

      - name: Rosdep update
        run: |
          sudo rosdep init || true
          rosdep update

      - name: Install package dependencies
        run: |
          cd RPI5/ros2_ws
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build workspace
        run: |
          cd RPI5/ros2_ws
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install

      - name: Run colcon tests
        run: |
          cd RPI5/ros2_ws
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test
          colcon test-result --verbose
