version: '3.8'

services:
  # LiDAR Container: Unitree L1, Point-LIO SLAM, Livox drivers
  # For LiDAR SLAM and point cloud processing
  lidar:
    build:
      context: ..
      dockerfile: docker/lidar/Dockerfile
    image: unitree-l1-lidar:ros2-jazzy
    container_name: lidar_container
    privileged: true
    network_mode: host  # ROS2 DDS communication across containers
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0  # Unitree L1 LiDAR (adjust as needed)
    volumes:
      - ../data:/root/data
      - ../ws:/root/ros2_ws  # Shared ROS2 workspace
      - ../scripts:/root/scripts
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0  # Ensure same domain for multi-container communication
    stdin_open: true
    tty: true
    command: /bin/bash

  # MAVROS Container: MAVLink bridge to PX4/ArduPilot flight controller
  # For drone control and telemetry
  mavros:
    build:
      context: ..
      dockerfile: docker/mavros/Dockerfile
    image: mavros-px4:ros2-jazzy
    container_name: mavros_container
    privileged: true
    network_mode: host  # ROS2 DDS communication across containers
    devices:
      - /dev/ttyACM0:/dev/ttyACM0  # Pixhawk/PX4 USB (adjust as needed)
    volumes:
      - ../data:/root/data
      - ../ws:/root/ros2_ws  # Shared ROS2 workspace
      - ../scripts:/root/scripts
    environment:
      - ROS_DOMAIN_ID=0  # Ensure same domain for multi-container communication
    stdin_open: true
    tty: true
    command: /bin/bash
