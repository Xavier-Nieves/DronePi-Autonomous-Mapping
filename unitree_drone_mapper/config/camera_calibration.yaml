# camera_calibration.yaml — IMX477 (ArduCam) intrinsic and extrinsic parameters
#
# Intrinsic calibration
#   Tool : OpenCV checkerboard calibration (9x6, 25mm squares)
#   RMS  : 1.99 px
#
# Extrinsic — T_cam_body (body frame -> camera frame)
#   Origin: LiDAR sensor frame = (0,0,0)
#   Validated: physical ruler + sketch, 2026-04-05
#
# Body frame convention (+X fwd, +Y left, +Z up)
#
# Physical mount (top-down):
#         +X (Pixhawk fwd)
#          ^
#   +Y <- [LiDAR]  (0, 0, 0)  looks down
#           | 0.070m in -Y
#         [Camera]             looks down, yaw-rotated vs LiDAR
#
# Translation [x, y, z] metres, origin = LiDAR:
#   x =  0.000   same forward position
#   y = -0.070   70mm to the RIGHT of LiDAR (-Y = right)
#   z = +0.030   30mm ABOVE LiDAR origin
#
# Rotation RPY [roll, pitch, yaw] radians (scipy 'xyz' / ZYX convention):
#   roll  = pi    Rx(pi): flips +Z up -> -Z down (optical axis toward ground)
#   pitch = 0.0
#   yaw   = pi    Rz(pi): flips +X fwd -> -X back (180 deg yaw vs LiDAR)
#
#   Combined R = [[-1,0,0],[0,1,0],[0,0,-1]]
#   cam +X -> backward, cam +Y -> left, cam +Z (optical) -> DOWN  (correct)
#
# SINGLE SOURCE OF TRUTH — camera_model.py is the only reader of this file.

camera:
  image_width:  4056
  image_height: 3040
  fx: 4805.613
  fy: 4773.894
  cx: 2008.339
  cy: 1478.886
  dist_coeffs: [-0.21973, 0.16747, 0.00039, -0.00060, -0.07611]

extrinsic:
  translation:   [0.0, -0.070, 0.030]
  rotation_rpy:  [3.14159265, 0.0, 3.14159265]
